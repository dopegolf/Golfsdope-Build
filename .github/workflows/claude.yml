      # once Ronnie confirms the GitHub account and approves
      # the Action marketplace installation.
      #
      # Reference: https://docs.anthropic.com/en/docs/claude-code/github-actions

      - name: Placeholder — Claude Action not yet configured
        run: echo "Claude GitHub Action will be configured after Ronnie approves GitHub account setup and Action installation."
