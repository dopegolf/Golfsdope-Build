name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only trigger on explicit @claude mentions
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Claude GitHub Action configuration
      # Initially restricted to:
      # - Explicit @claude mentions only (no auto-trigger)
      # - Sandbox branches only during pilot
      # - Human review remains mandatory for all PRs
